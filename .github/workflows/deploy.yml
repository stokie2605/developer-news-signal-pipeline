name: Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6:00 AM UTC
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Pipeline and Generate HTML Report
        run: |
          mkdir -p build
          python -m hn_signal.cli --limit 50 --html build/index.html --json build/latest-stories.json --db build/hn_signals.db
        env:
          PYTHONPATH: src

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
